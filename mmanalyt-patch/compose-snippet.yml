# Сервис парсера. Добавить в services: блок MMANALYT/docker-compose.yml
# (рядом с postgres, backend, frontend).
#
# profiles: [manual] — парсер НЕ стартует автоматически при `docker compose up`.
# Запуск только по требованию: `docker compose run --rm parser` (см. крон ниже).

parser:
  build:
    context: ../parser
  environment:
    DATABASE_URL: postgresql://moremania:${POSTGRES_PASSWORD}@postgres:5432/moremania?schema=public
    HEADLESS: "true"
  volumes:
    - ../parser/data/input:/app/data/input:ro
    - ../parser/data/output:/app/data/output
    - parser_cache:/root/.cache
  depends_on:
    postgres:
      condition: service_healthy
  profiles:
    - manual

# И в блок volumes: внизу файла добавить:
# volumes:
#   parser_cache:
